<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKT3039 Digital Marketing E-Portfolio | Toyota Gazoo Racing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111111;
            color: #ffffff;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #000000 0%, #1a0000 50%, #000000 100%);
            border-bottom: 3px solid #eb0a1e;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .header-left p {
            font-size: 0.75rem;
            color: #eb0a1e;
            margin-top: 2px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tgr-badge {
            background: #eb0a1e;
            color: white;
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* Progress Bar */
        .progress-container {
            background: #1a1a1a;
            padding: 12px 40px;
            border-bottom: 1px solid #222222;
        }

        .progress-label {
            font-size: 0.7rem;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .progress-bar-outer {
            background: #2a2a2a;
            border-radius: 10px;
            height: 6px;
            width: 100%;
        }

        .progress-bar-inner {
            background: linear-gradient(90deg, #eb0a1e, #ff4444);
            border-radius: 10px;
            height: 6px;
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Main Container */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Index Page */
        .index-page {
            display: block;
        }

        .welcome-banner {
            background: linear-gradient(135deg, #1a0000, #0d0d0d);
            border: 1px solid #eb0a1e;
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 40px;
            text-align: center;
        }

        .welcome-banner h2 {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .welcome-banner p {
            color: #cccccc;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .welcome-banner .student-info {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .info-pill {
            background: #111111;
            border: 1px solid #333333;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 0.8rem;
            color: #cccccc;
        }

        .info-pill span {
            color: #eb0a1e;
            font-weight: 700;
        }

        /* Section Cards */
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .section-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .section-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: #eb0a1e;
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .section-card:hover::before {
            transform: scaleX(1);
        }

        .section-card:hover {
            border-color: #eb0a1e;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(235, 10, 30, 0.15);
        }

        .card-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: #eb0a1e;
            opacity: 0.3;
            position: absolute;
            top: 10px;
            right: 20px;
        }

        .card-tag {
            font-size: 0.65rem;
            color: #eb0a1e;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            padding-right: 40px;
        }

        .card-desc {
            font-size: 0.8rem;
            color: #888888;
            line-height: 1.6;
        }

        .card-arrow {
            margin-top: 16px;
            color: #eb0a1e;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Section Pages */
        .section-page {
            display: none;
        }

        .section-page.active {
            display: block;
        }

        /* Navigation Button Row */
        .nav-btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 12px;
        }

        .back-btn {
            background: transparent;
            border: 1px solid #333333;
            color: #cccccc;
            padding: 10px 22px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: #eb0a1e;
            color: #eb0a1e;
        }

        .next-btn {
            background: #eb0a1e;
            border: 1px solid #eb0a1e;
            color: #ffffff;
            padding: 10px 22px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .next-btn:hover {
            background: #cc0818;
            border-color: #cc0818;
            transform: translateX(3px);
        }

        .next-btn.finish-btn {
            background: transparent;
            border: 1px solid #eb0a1e;
            color: #eb0a1e;
        }

        .next-btn.finish-btn:hover {
            background: #eb0a1e;
            color: #ffffff;
            transform: none;
        }

        /* Bottom Navigation Row */
        .bottom-nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #2a2a2a;
            gap: 12px;
        }

        .section-header {
            background: linear-gradient(135deg, #1a0000, #0d0d0d);
            border: 1px solid #2a2a2a;
            border-left: 4px solid #eb0a1e;
            border-radius: 8px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-header .sec-tag {
            font-size: 0.7rem;
            color: #eb0a1e;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .section-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .section-header p {
            font-size: 0.85rem;
            color: #888888;
            line-height: 1.6;
        }

        /* Content Blocks */
        .content-block {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 20px;
        }

        .content-block h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #eb0a1e;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a2a;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content-block p {
            font-size: 0.88rem;
            color: #cccccc;
            margin-bottom: 14px;
            line-height: 1.9;
        }

        .content-block ul {
            list-style: none;
            padding: 0;
        }

        .content-block ul li {
            font-size: 0.88rem;
            color: #cccccc;
            padding: 6px 0 6px 20px;
            position: relative;
            line-height: 1.7;
        }

        .content-block ul li::before {
            content: '▸';
            color: #eb0a1e;
            position: absolute;
            left: 0;
        }

        /* Highlight Box */
        .highlight-box {
            background: #1a0a0a;
            border: 1px solid #eb0a1e;
            border-radius: 6px;
            padding: 16px 20px;
            margin: 16px 0;
            font-size: 0.85rem;
            color: #dddddd;
            line-height: 1.8;
        }

        .highlight-box strong {
            color: #eb0a1e;
        }

        /* Stat Cards */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .stat-card {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.6rem;
            font-weight: 900;
            color: #eb0a1e;
            display: block;
        }

        .stat-label {
            font-size: 0.72rem;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Likert Table */
        .styled-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.82rem;
        }

        .styled-table th {
            background: #eb0a1e;
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
        }

        .styled-table td {
            padding: 12px 16px;
            border-bottom: 1px solid #222222;
            color: #cccccc;
            vertical-align: top;
            line-height: 1.7;
        }

        .styled-table tr:nth-child(even) td {
            background: #111111;
        }

        .styled-table tr:hover td {
            background: #1f1f1f;
        }

        .score-badge {
            background: #eb0a1e;
            color: white;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* Zone Cards */
        .zone-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .zone-card {
            background: #111111;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            padding: 20px;
        }

        .zone-card h4 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #eb0a1e;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .zone-card p {
            font-size: 0.8rem;
            color: #cccccc;
            line-height: 1.7;
        }

        .zone-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .badge-strong { background: #1a3a1a; color: #44ff44; }
        .badge-weak { background: #3a1a1a; color: #ff4444; }
        .badge-moderate { background: #3a3a1a; color: #ffaa44; }

        /* Ladder of Engagement */
        .ladder {
            margin: 20px 0;
        }

        .ladder-step {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 14px 0;
            border-bottom: 1px solid #222222;
        }

        .ladder-num {
            background: #eb0a1e;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .ladder-content h4 {
            font-size: 0.88rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .ladder-content p {
            font-size: 0.8rem;
            color: #888888;
            line-height: 1.6;
        }

        /* Reference List */
        .reference-item {
            padding: 12px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.85rem;
            color: #cccccc;
            line-height: 1.8;
        }

        .reference-item:last-child {
            border-bottom: none;
        }

        /* Footer */
        .footer {
            background: #000000;
            border-top: 1px solid #1a1a1a;
            padding: 20px 40px;
            text-align: center;
            font-size: 0.75rem;
            color: #444444;
            margin-top: 60px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header { padding: 15px 20px; }
            .main-container { padding: 20px 15px; }
            .welcome-banner { padding: 25px 20px; }
            .sections-grid { grid-template-columns: 1fr; }
            .nav-btn-row { flex-direction: column; align-items: stretch; }
            .bottom-nav-row { flex-direction: column; align-items: stretch; }
